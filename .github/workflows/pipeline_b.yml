name: Pipeline B — Agentic Scan (VIDOC-style)

# Pipeline B 改进点（对标 VIDOC 方法论）：
#   1. 模型可调用工具查看任意文件（解决 Pipeline A 的上下文隔离问题）
#   2. 两步流程：先规划切块，再按块并行检测
#   3. 使用更强模型（glm-4-plus 工具调用模式 / glm-z1-flash 推理模式）
#   4. 支持自定义目标 repo（不限于预置 extracts）

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "目标 repo URL（例：https://github.com/eclipse/mosquitto）"
        required: true
      target_ref:
        description: "Tag / branch / commit（默认 HEAD）"
        required: false
        default: "HEAD"
      target_paths:
        description: "只扫这些路径，逗号分隔（留空=全部.c/.cc）"
        required: false
        default: ""
      model:
        description: "使用模型"
        required: false
        type: choice
        default: "glm-5.1"
        options:
          - glm-5.1
          - glm-4-plus
          - glm-4-flash
          - glm-z1-flash
          - claude-opus-4-6
      max_files:
        description: "最多扫描文件数"
        required: false
        default: "50"

permissions:
  actions: write   # needed to trigger verify_chain.yml via gh workflow run
  contents: read

jobs:
  # ── Step 1: Clone & plan ──────────────────────────────────────
  plan:
    name: Clone target & generate scan plan
    runs-on: ubuntu-latest
    outputs:
      file_matrix: ${{ steps.planner.outputs.matrix }}
      total_files: ${{ steps.planner.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Clone target repo
        run: |
          git clone --depth=1 \
            ${{ github.event.inputs.target_repo }} /tmp/target
          cd /tmp/target && git checkout ${{ github.event.inputs.target_ref }} || true

      - name: Generate file scan plan
        id: planner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          TARGET_PATHS: ${{ github.event.inputs.target_paths }}
          MAX_FILES: ${{ github.event.inputs.max_files }}
          MODEL: ${{ github.event.inputs.model }}
        run: |
          python scripts/pipeline_b_plan.py \
            --target /tmp/target \
            --max-files "$MAX_FILES" \
            --paths "$TARGET_PATHS" \
            --model "$MODEL" \
            --output /tmp/scan_plan.json
          # 输出 JSON matrix 供后续 job 使用
          MATRIX=$(python -c "
          import json
          plan = json.load(open('/tmp/scan_plan.json'))
          files = plan['files'][:int('$MAX_FILES')]
          chunks = [files[i:i+5] for i in range(0, len(files), 5)]
          print(json.dumps({'chunk': [{'id': i, 'files': c} for i, c in enumerate(chunks)]}))
          ")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "total=$(python -c "import json; print(len(json.load(open('/tmp/scan_plan.json'))['files']))")" >> $GITHUB_OUTPUT

      - name: Upload scan plan
        uses: actions/upload-artifact@v4
        with:
          name: scan-plan
          path: /tmp/scan_plan.json

  # ── Step 2: Parallel detection (1 job per 5-file chunk) ──────
  detect:
    name: Detect chunk ${{ matrix.chunk.id }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.file_matrix) }}
      fail-fast: false
      max-parallel: 6  # glm-4-plus 有更高限额；429 时 detect.py 内有 retry，可承受

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Clone target repo
        run: |
          git clone --depth=1 \
            ${{ github.event.inputs.target_repo }} /tmp/target
          cd /tmp/target && git checkout ${{ github.event.inputs.target_ref }} || true

      - name: Download scan plan
        uses: actions/download-artifact@v4
        with:
          name: scan-plan
          path: /tmp/

      - name: Run agentic detection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MODEL: ${{ github.event.inputs.model }}
          CHUNK_FILES: ${{ toJson(matrix.chunk.files) }}
          CHUNK_ID: ${{ matrix.chunk.id }}
        run: |
          python scripts/pipeline_b_detect.py \
            --target /tmp/target \
            --files "$CHUNK_FILES" \
            --model "$MODEL" \
            --output results/chunk_${{ matrix.chunk.id }}.jsonl

      - name: Upload chunk results
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk.id }}
          path: results/chunk_${{ matrix.chunk.id }}.jsonl

  # ── Step 2.5: Build kill chains from signals ─────────────────
  chain_build:
    name: Build kill chains from signals
    needs: detect
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Clone target repo
        run: |
          git clone --depth=1 \
            ${{ github.event.inputs.target_repo }} /tmp/target
          cd /tmp/target && git checkout ${{ github.event.inputs.target_ref }} || true

      - name: Download all chunk results
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          merge-multiple: true
          path: results/

      - name: Build kill chains
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MODEL: ${{ github.event.inputs.model }}
        run: |
          python scripts/pipeline_b_chain.py \
            --input-dir results/ \
            --model "${MODEL:-glm-4-plus}" \
            --output results/chains.jsonl \
            --repo /tmp/target

      - name: Upload chains
        uses: actions/upload-artifact@v4
        with:
          name: chains
          path: results/chains.jsonl

      # ── 发现 kill chain 立即触发深度复核 pipeline ──────────────
      - name: Dispatch deep verify & notify Slack
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PARENT_MODEL: ${{ github.event.inputs.model }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PYEOF'
          import json, os, subprocess, urllib.request

          chains_file = "results/chains.jsonl"
          kill_chains = []
          try:
              with open(chains_file) as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      obj = json.loads(line)
                      if "chain_id" in obj:
                          kill_chains.append(obj)
          except Exception as e:
              print(f"⚠️  Could not read chains.jsonl: {e}")

          if not kill_chains:
              print("ℹ️  No kill chains found — skipping dispatch and notification")
              exit(0)

          # ── Slack 通知（第一条：发现了 kill chain）─────────────
          repo_name = os.environ["TARGET_REPO"].rstrip("/").split("/")[-1]
          run_id    = os.environ["GITHUB_RUN_ID"]
          repo_full = os.environ["GITHUB_REPOSITORY"]
          srv_url   = os.environ["GITHUB_SERVER_URL"]
          run_url   = f"{srv_url}/{repo_full}/actions/runs/{run_id}"
          webhook   = os.environ.get("SLACK_WEBHOOK_URL", "")

          # 按严重度排序
          kill_chains.sort(key=lambda c: (
              0 if c.get("severity") == "CRITICAL" else 1,
              -c.get("confidence", 0)
          ))

          chain_lines = []
          for c in kill_chains:
              sev  = c.get("severity", "?")
              conf = c.get("confidence", "?")
              ct   = c.get("chain_type", "?")
              cid  = c.get("chain_id", "?")
              sev_emoji = "🔴" if sev == "CRITICAL" else "🟠" if sev == "HIGH" else "🟡"
              chain_lines.append(f"{sev_emoji} *{cid}* [{sev}/conf={conf}]\n`{ct}`")
              steps = c.get("steps", [])
              for step in steps:
                  loc = step.get("location", "?")
                  sig = step.get("signal_type", "?")
                  chain_lines.append(f"  ↳ Step {step.get('step')}: [{sig}] `{loc}`")
              if c.get("attack_narrative"):
                  chain_lines.append(f"  📝 {c['attack_narrative'][:180]}")
              chain_lines.append("")

          blocks = [
              {"type": "header", "text": {"type": "plain_text",
               "text": f"🔗 CyberAI — Kill Chain(s) Detected"}},
              {"type": "section", "text": {"type": "mrkdwn",
               "text": f"*{len(kill_chains)} kill chain(s)* found in `{repo_name}`\n"
                       f"Deep verification triggered automatically ↓"}},
              {"type": "section", "text": {"type": "mrkdwn",
               "text": "\n".join(chain_lines) or "(none)"}},
              {"type": "context", "elements": [{"type": "mrkdwn",
               "text": f"<{run_url}|View Pipeline B run>"}]},
          ]

          if webhook:
              payload = json.dumps({"blocks": blocks}).encode()
              req = urllib.request.Request(webhook, data=payload,
                                           headers={"Content-Type": "application/json"})
              try:
                  urllib.request.urlopen(req, timeout=10)
                  print(f"✅ Slack notified: {len(kill_chains)} kill chains in {repo_name}")
              except Exception as e:
                  print(f"⚠️  Slack send failed: {e}")
          else:
              print("ℹ️  SLACK_WEBHOOK_URL not set, skipping Slack notification")

          # ── 触发 verify_chain.yml ───────────────────────────────
          # Inherit verify model from parent unless it's flash (need stronger model for deep verify)
          parent_model = os.environ.get("PARENT_MODEL", "glm-5.1")
          verify_model = "glm-5.1" if parent_model in ("glm-4-flash", "glm-z1-flash") else parent_model
          try:
              result = subprocess.run(
                  ["gh", "workflow", "run", "verify_chain.yml",
                   "--field", f"source_run_id={run_id}",
                   "--field", f"target_repo={os.environ['TARGET_REPO']}",
                   "--field", f"model={verify_model}",
                   "--field", "min_confidence=60",
                   "--repo", repo_full],
                  capture_output=True, text=True
              )
              if result.returncode == 0:
                  print(f"🚀 verify_chain.yml triggered (source_run_id={run_id})")
              else:
                  print(f"⚠️  workflow dispatch failed: {result.stderr[:200]}")
          except Exception as e:
              print(f"⚠️  Could not trigger verify_chain: {e}")
          PYEOF

  # ── Step 3: Aggregate & verify ───────────────────────────────
  aggregate:
    name: Aggregate results & second-pass verify
    needs: chain_build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[aliyun]"

      - name: Download chains
        uses: actions/download-artifact@v4
        with:
          name: chains
          path: results/

      - name: Merge & verify top candidates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MODEL: ${{ github.event.inputs.model }}
        run: |
          python scripts/verify_candidates.py \
            --input-dir results/ \
            --model "$MODEL" \
            --output results/verified.jsonl

      # 尝试合并 verify_chain.yml 的深度复核结果（best-effort：可能尚未完成）
      - name: Merge deep-verified chains (best-effort)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 找到本次 pipeline run 触发的 verify_chain run（如果已完成）
          VERIFY_RUN=$(gh run list \
            --workflow=verify_chain.yml \
            --limit=5 \
            --json databaseId,status,createdAt \
            --repo ${{ github.repository }} \
            | python3 -c "
          import json, sys
          runs = json.load(sys.stdin)
          # 取最近完成的一个
          for r in runs:
              if r['status'] == 'completed':
                  print(r['databaseId'])
                  break
          " 2>/dev/null || true)

          if [ -n "$VERIFY_RUN" ]; then
            echo "Found completed verify_chain run: $VERIFY_RUN"
            gh run download "$VERIFY_RUN" \
              --pattern "deep-verified-*" \
              --dir results/ \
              --repo ${{ github.repository }} 2>/dev/null && \
            echo "✅ Merged deep_verified.jsonl" || \
            echo "ℹ️  deep_verified artifact not yet available (verify_chain still running)"
          else
            echo "ℹ️  No completed verify_chain run found yet"
          fi

      - name: Generate triage report
        run: |
          python scripts/process_scan_results.py \
            --input results/verified.jsonl \
            --output results/triage_report.md

      - name: Upload final results
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-b-results-${{ github.run_id }}
          path: results/
          retention-days: 90

      - name: Push results to OSS
        if: always()
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          python - <<'EOF'
          import oss2, os, glob, pathlib
          auth = oss2.Auth(
              os.environ["ALIYUN_ACCESS_KEY_ID"],
              os.environ["ALIYUN_ACCESS_KEY_SECRET"]
          )
          bucket = oss2.Bucket(auth, "https://oss-us-west-1.aliyuncs.com",
                               os.environ["ALIYUN_OSS_BUCKET"])
          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          repo = os.environ.get("GITHUB_REPOSITORY", "unknown")
          for f in glob.glob("results/**/*", recursive=True):
              if pathlib.Path(f).is_file():
                  key = f"pipeline-b/{run_id}/{pathlib.Path(f).name}"
                  bucket.put_object_from_file(key, f)
                  print(f"uploaded: {key}")
          EOF

      - name: Print triage summary
        run: |
          echo "## Pipeline B Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ github.event.inputs.target_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ github.event.inputs.model }}" >> $GITHUB_STEP_SUMMARY
          if [ -f results/triage_report.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat results/triage_report.md >> $GITHUB_STEP_SUMMARY
          fi
